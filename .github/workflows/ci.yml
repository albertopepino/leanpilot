name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Backend linting with ruff
  # -----------------------------------------------------------------------
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check app/ --output-format=github

  # -----------------------------------------------------------------------
  # Frontend linting with next lint
  # -----------------------------------------------------------------------
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # -----------------------------------------------------------------------
  # TypeScript type checking
  # -----------------------------------------------------------------------
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # -----------------------------------------------------------------------
  # Backend tests with PostgreSQL + Redis service containers
  # -----------------------------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: leanpilot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: leanpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://leanpilot:testpass@localhost:5432/leanpilot_test
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
          CORS_ORIGINS: "http://localhost:3000"
        run: pytest tests/ -v --tb=short
      - name: Check migrations are up to date
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://leanpilot:testpass@localhost:5432/leanpilot_test
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
        run: alembic upgrade head

  # -----------------------------------------------------------------------
  # Frontend tests (vitest)
  # -----------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run tests
        working-directory: frontend
        run: npm run test:ci

  # -----------------------------------------------------------------------
  # Frontend production build (depends on lint + type-check passing)
  # -----------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # -----------------------------------------------------------------------
  # Security audit (Python + npm dependency scanning)
  # -----------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt || true
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # -----------------------------------------------------------------------
  # Docker build smoke test (main branch only)
  # -----------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t lean-os-backend ./backend
      - name: Build frontend image
        run: docker build -t lean-os-frontend ./frontend --build-arg NEXT_PUBLIC_API_URL=http://backend:8000
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lean-os-backend
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

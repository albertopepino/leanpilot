name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check app/

  security-scan:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: leanpilot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: leanpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://leanpilot:testpass@localhost:5432/leanpilot_test
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
        run: pytest tests/ -v --tb=short
      - name: Check migrations are up to date
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://leanpilot:testpass@localhost:5432/leanpilot_test
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
        run: alembic check

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t lean-os-backend ./backend
      - name: Build frontend image
        run: docker build -t lean-os-frontend ./frontend --build-arg NEXT_PUBLIC_API_URL=http://backend:8000
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lean-os-backend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${EC2_HOST:-}" ]; then
            echo "Skipping deploy — EC2_HOST secret not configured"
            echo "Set EC2_HOST, EC2_USER, SSH_PRIVATE_KEY in repo secrets to enable auto-deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${EC2_USER}@${EC2_HOST} '
            cd /home/ubuntu/lean-os &&
            git pull origin main &&
            docker compose down &&
            docker compose up -d --build &&
            docker compose ps &&
            echo "Deploy complete!"
          '
